name: macOS Installation Test

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test-macos:
    runs-on: macos-latest
    env:
      CI: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Grant execution permissions
        run: chmod +x setup install scripts/* os/* bin/* modules/*/install.sh

      - name: Install Homebrew packages
        run: |
          echo "📦 Installing Brewfile dependencies..."
          brew bundle --file=Brewfile --no-lock

      - name: Run Symlinks
        run: |
          echo "🔗 Creating symlinks..."
          ./scripts/link-dotfiles

      - name: Apply macOS settings
        run: |
          echo "⚙️ Applying macOS settings (CI-safe)..."
          ./os/macos.sh

      - name: Run Module Installers
        run: |
          echo "🧩 Running module installers..."
          for module_script in modules/*/install.sh; do
            module_name="$(basename "$(dirname "$module_script")")"
            echo "--- [$module_name] ---"
            bash "$module_script" || echo "⚠️ $module_name skipped (expected in CI)"
          done

      - name: Run Environment Diagnostics
        run: |
          echo "--- Running bin/doctor ---"
          ./bin/doctor

      - name: Verify Key Artifacts
        run: |
          echo "--- Verifying Symlinks ---"
          [ -L "$HOME/.zshrc" ] && echo "✅ .zshrc symlink OK" || exit 1
          [ -L "$HOME/.gitconfig" ] && echo "✅ .gitconfig symlink OK" || exit 1

          echo "--- Verifying CLI Tools ---"
          command -v eza && echo "✅ eza OK"
          command -v bat && echo "✅ bat OK"
          command -v rg && echo "✅ ripgrep OK"
          command -v fd && echo "✅ fd OK"
          command -v sd && echo "✅ sd OK"
          command -v fzf && echo "✅ fzf OK"
          command -v fnm && echo "✅ fnm OK"
          command -v gh && echo "✅ gh OK"
          command -v delta && echo "✅ delta OK"
          command -v zoxide && echo "✅ zoxide OK"
          command -v atuin && echo "✅ atuin OK"

          echo "--- Verifying bin scripts ---"
          ./bin/dev --help || true
          ./bin/dot --help || true
